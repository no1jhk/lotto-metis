name: 당첨번호 자동 업데이트

on:
  schedule:
    - cron: '0 14 * * 6'  # 매주 토요일 23:00 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install requests beautifulsoup4 lxml

      - name: 당첨번호 수집
        run: python scripts/fetch_draws.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/draws.json
          git diff --staged --quiet || git commit -m "data: 당첨번호 자동 업데이트 $(date +'%Y-%m-%d')"
          git push
